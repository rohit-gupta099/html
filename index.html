<!DOCTYPE html>
<html>
<head>
    <title>HTML Input All Types data</title>
</head>
<body>

<h2>HTML Input Examples</h2>

<form>

    <!-- Text -->
    Name: <input type="text" name="name"><br><br>

    <!-- Password -->
    Password: <input type="password" name="pass"><br><br>

    <!-- Email -->
    Email: <input type="email" name="email"><br><br>

    <!-- Number -->
    Age: <input type="number" name="age"><br><br>

    <!-- Radio -->
    Gender:
    <input type="radio" name="gender" value="male"> Male
    <input type="radio" name="gender" value="female"> Female<br><br>

    <!-- Checkbox -->
    Skills:
    <input type="checkbox" name="skill" value="c"> C
    <input type="checkbox" name="skill" value="java"> Java
    <input type="checkbox" name="skill" value="python"> Python<br><br>

    <!-- Date -->
    Date of Birth: <input type="date"><br><br>

    <!-- Time -->
    Time: <input type="time"><br><br>

    <!-- File -->
    Upload File: <input type="file"><br><br>

    <!-- Color -->
    Favorite Colors: <input type="color"><br><br>

    <!-- Range -->
    Volume: <input type="range" min="0" max="100"><br><br>

    <!-- URL -->
    Website: <input type="url"><br><br>

    <!-- Search -->
    Search: <input type="search"><br><br>

    <!-- Hidden -->
    <input type="hidden" value="hiddenData">

    <!-- Submit -->
    <input type="submit" value="Submit">

    <!-- Reset -->
    <input type="reset" value="Reset">

</form>

</body>
</html>
